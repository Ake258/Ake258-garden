# yaml-language-server: $schema=./quartz/plugins/quartz-plugins.schema.json
configuration:
  pageTitle: Ake258 ;-)
  pageTitleSuffix: ""
  enableSPA: true
  enablePopovers: true
  analytics:
    provider: null
  locale: zh-CN
  baseUrl: Ake258.online
  ignorePatterns:
    - private
    - templates
    - .obsidian
    - .nomedia
  theme:
    fontOrigin: local
    cdnCaching: false
    typography:
      header: "LXGW WenKai Screen Lora"
      body: "LXGW WenKai Screen Lora"
      code: "LXGW WenKai Screen Lora"
    colors:
      lightMode:
        light: "#f7f5eb"
        lightgray: "#e0ddd7"
        gray: "#a09d98"
        darkgray: "#5c534b"
        dark: "#242220"
        secondary: "#635b8f"
        tertiary: "#69a3d6"
        highlight: rgba(143, 159, 169, 0.15)
        textHighlight: "#b8c8d488"
      darkMode:
        light: "#1b1a17"
        lightgray: "#363431"
        gray: "#6e6a65"
        darkgray: "#c5c0b8"
        dark: "#e8e4dc"
        secondary: "#8b83b0"
        tertiary: "#7ab8e0"
        highlight: rgba(139, 131, 176, 0.15)
        textHighlight: "#5a557088"
plugins:
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      defaultDateType: modified
      priority:
        - frontmatter
        - git
        - filesystem
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: github-light
        dark: github-dark
      keepBackground: false
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      enableInHtmlEmbed: false
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout:
      position: right
      priority: 30
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/latex
    enabled: true
    options:
      renderEngine: katex
    order: 80
  - source: github:quartz-community/remove-draft
    enabled: true
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/og-image
    enabled: false
  - source: github:quartz-community/cname
    enabled: true
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: true
  - source: github:quartz-community/tag-page
    enabled: true
  - source: github:quartz-community/explorer
    enabled: true
    layout:
      position: left
      priority: 50
  - source: github:quartz-community/graph
    enabled: true
    layout:
      position: right
      priority: 10
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 20
      group: toolbar
      groupOptions:
        grow: true
  - source: github:quartz-community/backlinks
    enabled: true
    layout:
      position: right
      priority: 50
  - source: github:quartz-community/article-title
    enabled: true
    layout:
      position: beforeBody
      priority: 10
  - source: github:quartz-community/content-meta
    enabled: true
    layout:
      position: beforeBody
      priority: 20
  - source: github:quartz-community/page-title
    enabled: true
    layout:
      position: left
      priority: 10
  - source: github:quartz-community/darkmode
    enabled: true
    layout:
      position: left
      priority: 30
      group: toolbar
  - source: github:quartz-community/breadcrumbs
    enabled: true
    layout:
      position: beforeBody
      priority: 5
      condition: not-index
  - source: github:quartz-community/fonts
    enabled: true
  - source: github:quartz-community/footer
    enabled: true
    options:
      links:
        GitHub: https://github.com/Ake258/Ake258-garden
  - source: github:quartz-community/spacer
    enabled: true
    options: {}
    order: 25
    layout:
      position: left
      priority: 25
      display: mobile-only
  - source: github:quartz-community/note-properties
    enabled: true
    options:
      includeAll: false
      collapsed: false
      includedProperties:
        - description
        - tags
        - aliases
      excludedProperties: []
      hidePropertiesView: false
      delimiters: "---"
      language: yaml
    order: 5
    layout:
      position: beforeBody
      priority: 15
      display: all




  - source: github:quartz-community/reader-mode
    enabled: true
    layout:
      position: left
      priority: 35
      group: toolbar
layout:
  groups:
    toolbar:
      priority: 35
      direction: row
      gap: 0.5rem
